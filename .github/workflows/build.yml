name: Build EXE

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirement.txt

      - name: Build with PyInstaller
        run: pyinstaller -F -i "icon.ico" -w --name "dota2_local_change" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota2_local_change
          path: dist/dota2_local_change.exe
